<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Confluence Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.875rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #cbd5e1; }
    textarea, input, select { width: 100%; padding: 0.75rem; border: 1px solid #334155; border-radius: 0.5rem; background: #1e293b; color: #f1f5f9; font-size: 0.9rem; font-family: inherit; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: flex; gap: 1rem; }
    .row .form-group { flex: 1; }
    .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    button { padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn-secondary:disabled { color: #6b7280; cursor: not-allowed; }
    .status { margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem; font-size: 0.875rem; display: none; }
    .status.loading { display: block; background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; }
    .status.success { display: block; background: #14532d; border: 1px solid #22c55e; color: #86efac; }
    .status.error { display: block; background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .result { margin-top: 1.5rem; }
    .result h3 { font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
    .result pre { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; font-size: 0.8rem; color: #e2e8f0; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
    .result a { color: #818cf8; }
    .links { margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .links a { color: #818cf8; font-size: 0.8rem; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    .pill-free { background: #14532d; color: #86efac; }
    .pill-local { background: #1e3a5f; color: #93c5fd; }
    .tab-active { background: #6366f1 !important; color: white !important; border-color: #6366f1 !important; }
    .rendered-markdown { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; overflow-x: auto; font-size: 0.875rem; color: #e2e8f0; max-height: 700px; overflow-y: auto; line-height: 1.6; }
    .rendered-markdown h1 { font-size: 1.5rem; color: #f8fafc; margin: 0 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; }
    .rendered-markdown h2 { font-size: 1.2rem; color: #f1f5f9; margin: 1.5rem 0 0.75rem 0; padding-bottom: 0.35rem; border-bottom: 1px solid #1e293b; }
    .rendered-markdown h3 { font-size: 1rem; color: #e2e8f0; margin: 1.25rem 0 0.5rem 0; }
    .rendered-markdown h4 { font-size: 0.9rem; color: #cbd5e1; margin: 1rem 0 0.4rem 0; }
    .rendered-markdown p { margin: 0.5rem 0; }
    .rendered-markdown strong { color: #f8fafc; }
    .rendered-markdown blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; margin: 0.75rem 0; color: #94a3b8; }
    .rendered-markdown hr { border: none; border-top: 1px solid #334155; margin: 1.5rem 0; }
    .rendered-markdown ul, .rendered-markdown ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .rendered-markdown li { margin: 0.25rem 0; }
    .rendered-markdown code { background: #0f172a; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.8rem; color: #a5b4fc; }
    .rendered-markdown pre { background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; padding: 0.75rem; overflow-x: auto; margin: 0.75rem 0; }
    .rendered-markdown pre code { background: none; padding: 0; color: #e2e8f0; }
    .rendered-markdown table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.8rem; }
    .rendered-markdown th { background: #0f172a; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid #334155; color: #94a3b8; font-weight: 600; }
    .rendered-markdown td { padding: 0.5rem 0.75rem; border: 1px solid #334155; }
    .rendered-markdown tr:hover td { background: #0f172a33; }
    .rendered-markdown a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Confluence Pipeline</h1>
    <p class="subtitle">Generate technical analysis, push to Confluence, create Jira tickets <span class="pill pill-local">LOCAL</span></p>

    <div class="form-group">
      <label for="pipeline">Pipeline</label>
      <select id="pipeline">
        <option value="preview">Preview — save as markdown, push later (recommended)</option>
        <option value="analyze">Direct Push — create Confluence page + Jira tickets now</option>
        <option value="analyze-no-jira">Direct Push — Confluence page only (no Jira)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="description">Feature / Task Description</label>
      <textarea id="description" placeholder="e.g., Add user notification preferences with email, push, and in-app channels. Users should be able to configure which events trigger notifications and through which channels."></textarea>
    </div>

    <div class="form-group">
      <label for="context">Additional Context (optional)</label>
      <textarea id="context" rows="3" placeholder="e.g., We use PostgreSQL, React Native frontend, .NET backend with FastEndpoints. Push notifications via Firebase."></textarea>
    </div>

    <div class="actions">
      <button class="btn-primary" id="submit" onclick="runPipeline()">Generate Analysis</button>
      <button class="btn-secondary" id="clear" onclick="clearForm()">Clear</button>
    </div>

    <div class="status" id="status"></div>

    <div class="result" id="result" style="display:none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
        <h3 style="margin: 0;">Result</h3>
        <div id="view-toggle" style="display: none;">
          <button class="btn-secondary tab-active" id="tab-preview" onclick="switchView('preview')" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 0.375rem 0 0 0.375rem;">Preview</button>
          <button class="btn-secondary" id="tab-raw" onclick="switchView('raw')" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 0 0.375rem 0.375rem 0; margin-left: -1px;">Raw Markdown</button>
        </div>
      </div>
      <div id="result-links" class="links"></div>
      <div id="download-actions" style="display:none; margin-bottom: 0.75rem;">
        <button class="btn-primary" id="download-md" onclick="downloadFile('md')" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Download .md</button>
        <button class="btn-secondary" id="download-json" onclick="downloadFile('json')" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Download .json</button>
        <button class="btn-secondary" id="copy-md" onclick="copyMarkdown()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Copy Markdown</button>
      </div>
      <div id="result-preview" class="rendered-markdown"></div>
      <pre id="result-content" style="display: none;"></pre>
    </div>
  </div>

  <script>
    const PORT = 10353;
    let lastResult = null; // stores the last response for download

    async function runPipeline() {
      const pipeline = document.getElementById('pipeline').value;
      const description = document.getElementById('description').value.trim();
      const context = document.getElementById('context').value.trim();
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const resultContent = document.getElementById('result-content');
      const resultLinks = document.getElementById('result-links');

      if (!description) {
        status.className = 'status error';
        status.textContent = 'Please enter a description.';
        return;
      }

      document.getElementById('submit').disabled = true;
      status.className = 'status loading';
      status.textContent = 'Generating analysis... this takes 15-60 seconds depending on the model.';
      result.style.display = 'none';

      const isPreview = pipeline === 'preview';
      const webhookPath = isPreview ? 'preview' : 'analyze';

      const body = {
        featureDescription: description,
        additionalContext: context
      };

      if (!isPreview) {
        body.createJiraTasks = pipeline !== 'analyze-no-jira';
      }

      try {
        const response = await fetch(`http://localhost:${PORT}/webhook/${webhookPath}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        let data = await response.json();

        // n8n lastNode mode may wrap response in an array or under nested keys
        if (Array.isArray(data)) data = data[0];
        if (data?.json) data = data.json;

        // Check if we got a valid response (any of these fields means success)
        const isSuccess = data.success || data.analysis || data.markdown || data.title || data.confluencePage;

        if (isSuccess) {
          status.className = 'status success';

          if (isPreview) {
            lastResult = data;
            status.textContent = `Analysis generated: ${data.title}. Download the files or copy the markdown below.`;
            resultLinks.innerHTML = '';
            document.getElementById('download-actions').style.display = 'flex';
            document.getElementById('download-actions').style.gap = '0.5rem';
            document.getElementById('view-toggle').style.display = 'flex';
            const md = data.markdown || JSON.stringify(data.analysis, null, 2);
            resultContent.textContent = md;
            document.getElementById('result-preview').innerHTML = markdownToHtml(md);
            switchView('preview');
          } else {
            document.getElementById('download-actions').style.display = 'none';
            document.getElementById('view-toggle').style.display = 'none';
            document.getElementById('result-preview').style.display = 'none';
            resultContent.style.display = 'block';
            const parts = [];
            if (data.confluencePage?.url) parts.push(`Confluence: ${data.confluencePage.url}`);
            if (data.taskCount > 0) parts.push(`${data.taskCount} Jira tickets created`);
            status.textContent = parts.join(' | ') || 'Done!';

            resultLinks.innerHTML = '';
            if (data.confluencePage?.url) {
              resultLinks.innerHTML += `<a href="${data.confluencePage.url}" target="_blank">Open Confluence Page</a>`;
            }
            if (data.jiraIssues?.length) {
              for (const issue of data.jiraIssues) {
                if (issue.url) resultLinks.innerHTML += `<a href="${issue.url}" target="_blank">${issue.key}</a>`;
              }
            }
            resultContent.textContent = JSON.stringify(data, null, 2);
          }

          result.style.display = 'block';
        } else if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${JSON.stringify(data, null, 2)}`);
        } else {
          // Response is 200 but unexpected shape — show it anyway
          status.className = 'status success';
          status.textContent = 'Analysis complete (unexpected response format — showing raw output)';
          lastResult = data;
          resultLinks.innerHTML = '';
          document.getElementById('download-actions').style.display = 'none';
          resultContent.textContent = JSON.stringify(data, null, 2);
          result.style.display = 'block';
        }
      } catch (e) {
        status.className = 'status error';
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          status.textContent = `Cannot reach n8n at localhost:${PORT}. Is it running? (docker compose up -d)`;
        } else {
          status.textContent = `Error: ${e.message}`;
        }
        result.style.display = 'none';
      }

      document.getElementById('submit').disabled = false;
    }

    function clearForm() {
      document.getElementById('description').value = '';
      document.getElementById('context').value = '';
      document.getElementById('status').className = 'status';
      document.getElementById('result').style.display = 'none';
      document.getElementById('download-actions').style.display = 'none';
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('result-preview').innerHTML = '';
      lastResult = null;
    }

    function switchView(view) {
      const preview = document.getElementById('result-preview');
      const raw = document.getElementById('result-content');
      const tabPreview = document.getElementById('tab-preview');
      const tabRaw = document.getElementById('tab-raw');
      if (view === 'preview') {
        preview.style.display = 'block';
        raw.style.display = 'none';
        tabPreview.classList.add('tab-active');
        tabRaw.classList.remove('tab-active');
      } else {
        preview.style.display = 'none';
        raw.style.display = 'block';
        tabPreview.classList.remove('tab-active');
        tabRaw.classList.add('tab-active');
      }
    }

    function markdownToHtml(md) {
      // Simple markdown to HTML converter (no external deps)
      let html = md;
      // Code blocks (``` ... ```)
      html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim()}</code></pre>`);
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Tables
      html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      });
      // Headers
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Bold and italic
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Blockquotes
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // Unordered lists
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      // Horizontal rules
      html = html.replace(/^---$/gm, '<hr>');
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      // Paragraphs (lines not already wrapped in HTML tags)
      html = html.replace(/^(?!<[a-z/])(.+)$/gm, '<p>$1</p>');
      // Clean up empty paragraphs
      html = html.replace(/<p>\s*<\/p>/g, '');
      return html;
    }

    function getFilename(ext) {
      if (!lastResult) return `analysis.${ext}`;
      const title = lastResult.title || 'analysis';
      const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 50);
      const timestamp = new Date().toISOString().replace(/[T:]/g, '-').split('.')[0];
      return `${timestamp}-${slug}.${ext}`;
    }

    function downloadFile(type) {
      if (!lastResult) return;
      let content, mimeType, filename;

      if (type === 'md') {
        content = lastResult.markdown;
        mimeType = 'text/markdown';
        filename = getFilename('md');
      } else {
        content = JSON.stringify(lastResult.analysis, null, 2);
        mimeType = 'application/json';
        filename = getFilename('json');
      }

      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyMarkdown() {
      if (!lastResult?.markdown) return;
      navigator.clipboard.writeText(lastResult.markdown).then(() => {
        const btn = document.getElementById('copy-md');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }

    // Allow Ctrl+Enter to submit
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') runPipeline();
    });
  </script>
</body>
</html>

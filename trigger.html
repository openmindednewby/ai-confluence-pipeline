<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Confluence Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.875rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #cbd5e1; }
    .label-hint { font-weight: 400; color: #64748b; font-size: 0.8rem; }
    textarea, input, select { width: 100%; padding: 0.75rem; border: 1px solid #334155; border-radius: 0.5rem; background: #1e293b; color: #f1f5f9; font-size: 0.9rem; font-family: inherit; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    textarea { min-height: 120px; resize: vertical; }
    select option { background: #1e293b; }
    select optgroup { color: #94a3b8; font-style: normal; }
    .row { display: flex; gap: 1rem; }
    .row .form-group { flex: 1; }
    .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    button { padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn-secondary:disabled { color: #6b7280; cursor: not-allowed; }
    .status { margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem; font-size: 0.875rem; display: none; }
    .status.loading { display: block; background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; }
    .status.success { display: block; background: #14532d; border: 1px solid #22c55e; color: #86efac; }
    .status.error { display: block; background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .result { margin-top: 1.5rem; }
    .result pre { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; font-size: 0.8rem; color: #e2e8f0; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
    .result a { color: #818cf8; }
    .links { margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .links a { color: #818cf8; font-size: 0.8rem; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    .pill-local { background: #1e3a5f; color: #93c5fd; }
    .tab-active { background: #6366f1 !important; color: white !important; border-color: #6366f1 !important; }
    .template-desc { color: #64748b; font-size: 0.8rem; margin-top: 0.35rem; min-height: 1.2rem; }
    .rendered-markdown { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; overflow-x: auto; font-size: 0.875rem; color: #e2e8f0; max-height: 700px; overflow-y: auto; line-height: 1.6; }
    .rendered-markdown h1 { font-size: 1.5rem; color: #f8fafc; margin: 0 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; }
    .rendered-markdown h2 { font-size: 1.2rem; color: #f1f5f9; margin: 1.5rem 0 0.75rem 0; padding-bottom: 0.35rem; border-bottom: 1px solid #1e293b; }
    .rendered-markdown h3 { font-size: 1rem; color: #e2e8f0; margin: 1.25rem 0 0.5rem 0; }
    .rendered-markdown h4 { font-size: 0.9rem; color: #cbd5e1; margin: 1rem 0 0.4rem 0; }
    .rendered-markdown p { margin: 0.5rem 0; }
    .rendered-markdown strong { color: #f8fafc; }
    .rendered-markdown blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; margin: 0.75rem 0; color: #94a3b8; }
    .rendered-markdown hr { border: none; border-top: 1px solid #334155; margin: 1.5rem 0; }
    .rendered-markdown ul, .rendered-markdown ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .rendered-markdown li { margin: 0.25rem 0; }
    .rendered-markdown code { background: #0f172a; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.8rem; color: #a5b4fc; }
    .rendered-markdown pre { background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; padding: 0.75rem; overflow-x: auto; margin: 0.75rem 0; }
    .rendered-markdown pre code { background: none; padding: 0; color: #e2e8f0; }
    .rendered-markdown table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.8rem; }
    .rendered-markdown th { background: #0f172a; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid #334155; color: #94a3b8; font-weight: 600; }
    .rendered-markdown td { padding: 0.5rem 0.75rem; border: 1px solid #334155; }
    .rendered-markdown tr:hover td { background: #0f172a33; }
    .rendered-markdown a { color: #818cf8; }
    .result-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .result-card a { color: #818cf8; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .result-card a:hover { text-decoration: underline; }
    .result-card .card-meta { color: #94a3b8; font-size: 0.8rem; margin-top: 0.25rem; }
    .result-card .card-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
    .badge-created { background: #14532d; color: #86efac; }
    .badge-updated { background: #1e3a5f; color: #93c5fd; }
    .result-cards { margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Confluence Pipeline</h1>
    <p class="subtitle">Generate AI analysis, push markdown to Confluence, create Jira tickets <span class="pill pill-local">LOCAL</span></p>

    <div class="row">
      <div class="form-group">
        <label for="pipeline">Pipeline</label>
        <select id="pipeline" onchange="onPipelineChange()">
          <optgroup label="AI Analysis">
            <option value="preview">Preview — save as markdown, push later</option>
            <option value="preview-iterative">Iterative Preview — AI generates, critiques, you refine</option>
            <option value="preview-cli">Preview via Claude CLI</option>
            <option value="preview-gh">Preview via gh models CLI (GitHub Copilot)</option>
            <option value="analyze">Direct Push — Confluence + Jira</option>
            <option value="analyze-no-jira">Direct Push — Confluence only</option>
          </optgroup>
          <optgroup label="Markdown → Publish (no AI)">
            <option value="markdown-to-jira">Markdown → Jira Epic + Stories</option>
            <option value="markdown-to-confluence">Markdown → Confluence Page</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group" id="template-group">
        <label for="template">Template</label>
        <select id="template" onchange="onTemplateChange()">
          <optgroup label="General (default)">
            <option value="generic" selected>Generic Technical Analysis</option>
          </optgroup>
          <optgroup label="Full Pipeline (Confluence + Jira)">
            <option value="new-feature">New Feature</option>
            <option value="tech-migration">Tech Stack Migration</option>
            <option value="large-refactoring">Large Refactoring</option>
            <option value="api-breaking-change">API Breaking Change</option>
            <option value="security-audit">Security Audit</option>
            <option value="performance-optimization">Performance Optimization</option>
            <option value="scheduled-task-migration">Scheduled Task Migration</option>
          </optgroup>
          <optgroup label="Confluence Only (documentation)">
            <option value="adr">Architecture Decision Record</option>
            <option value="post-mortem">Post-Mortem / Incident Report</option>
            <option value="runbook">Operational Runbook</option>
            <option value="service-documentation">Service / App / Library Documentation</option>
          </optgroup>
          <optgroup label="Jira Only (quick tickets)">
            <option value="bug-fix">Bug Fix</option>
            <option value="dependency-update">Dependency Update</option>
            <option value="tech-debt">Tech Debt Item</option>
            <option value="quick-enhancement">Quick Enhancement</option>
          </optgroup>
          <optgroup label="Legacy Prompts">
            <option value="legacy-technical">Technical Analysis (original)</option>
            <option value="legacy-bug">Bug Analysis (original)</option>
            <option value="legacy-spike">Spike / Research (original)</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div id="ai-fields">
      <p class="template-desc" id="template-desc">Default analysis — architecture, APIs, database, edge cases, tasks</p>

      <div class="form-group">
        <label for="description">Description <span class="label-hint">— what you want analyzed</span></label>
        <textarea id="description" placeholder="e.g., Add user notification preferences with email, push, and in-app channels. Users should be able to configure which events trigger notifications and through which channels."></textarea>
      </div>

      <div class="form-group">
        <label for="context">Additional Context <span class="label-hint">(optional — tech stack, constraints, etc.)</span></label>
        <textarea id="context" rows="3" placeholder="e.g., We use PostgreSQL, React Native frontend, .NET backend with FastEndpoints. Push notifications via Firebase."></textarea>
      </div>
    </div>

    <input type="file" id="md-file-input" accept=".md,.txt,.markdown" style="display:none;" />

    <div id="jira-panel" style="display:none;">
      <div class="row">
        <div class="form-group">
          <label>Existing Epic Key/URL <span class="label-hint">(optional — leave blank to create new)</span></label>
          <input id="epic-key" placeholder="e.g., PROJ-123 or full URL" />
        </div>
        <div class="form-group">
          <label>Component <span class="label-hint">(applies to all issues)</span></label>
          <input id="jira-component" placeholder="e.g., Backend, Frontend, Platform" />
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Default Assignee <span class="label-hint">(Jira Account ID — applies to all)</span></label>
          <input id="jira-assignee" placeholder="Account ID, profile URL, or email" />
        </div>
        <div class="form-group">
          <label>Reporter / Owner <span class="label-hint">(optional)</span></label>
          <input id="jira-reporter" placeholder="Account ID, profile URL, or email" />
        </div>
      </div>
      <p style="color:#64748b; font-size:0.75rem; margin:-0.5rem 0 0.75rem 0;">Accepts: Account ID, Atlassian profile URL (auto-extracts ID), or email (auto-resolved via Jira API).</p>
      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label style="margin:0;">Epic Markdown <span class="label-hint">— title, description, acceptance criteria</span></label>
          <button class="btn-secondary" onclick="importMdFile('epic-markdown')" style="padding:0.2rem 0.6rem; font-size:0.7rem;">Import .md</button>
        </div>
        <textarea id="epic-markdown" rows="8" placeholder="# Epic Title&#10;&#10;Description of the epic...&#10;&#10;## Acceptance Criteria&#10;- Given X, when Y, then Z&#10;&#10;## Priority&#10;High&#10;&#10;## Labels&#10;notifications, backend"></textarea>
      </div>
      <div id="task-list">
        <div class="form-group task-entry">
          <div class="row" style="margin-bottom:0.35rem;">
            <input class="task-key" placeholder="Existing task key (optional, e.g., PROJ-456)" style="flex:1;" />
            <input class="task-assignee" placeholder="Assignee (optional — Account ID, URL, or email)" style="flex:1;" />
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="margin:0;">Task 1 <span class="label-hint">— becomes a Story linked to the epic</span></label>
            <div>
              <button class="btn-secondary" onclick="importMdToSibling(this)" style="padding:0.2rem 0.6rem; font-size:0.7rem;">Import .md</button>
              <button class="btn-secondary" onclick="removeTask(this)" style="padding:0.2rem 0.5rem; font-size:0.7rem;">Remove</button>
            </div>
          </div>
          <textarea class="task-markdown" rows="6" placeholder="# Task Title&#10;&#10;Task description...&#10;&#10;## Acceptance Criteria&#10;- Given X, when Y, then Z&#10;&#10;## Priority&#10;Medium&#10;&#10;## Estimate&#10;M&#10;&#10;## Component&#10;backend"></textarea>
        </div>
      </div>
      <button class="btn-secondary" onclick="addTask()" style="margin-top:0.5rem; font-size:0.8rem;">+ Add Task</button>
    </div>

    <div id="confluence-panel" style="display:none;">
      <div class="form-group">
        <label>Existing Page ID/URL <span class="label-hint">(optional — leave blank to create new)</span></label>
        <input id="confluence-page-id" placeholder="e.g., 123456789 or https://company.atlassian.net/wiki/spaces/SPACE/pages/123456789/Title" />
      </div>
      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label style="margin:0;">Page Markdown <span class="label-hint">— main page content</span></label>
          <button class="btn-secondary" onclick="importMdFile('page-markdown')" style="padding:0.2rem 0.6rem; font-size:0.7rem;">Import .md</button>
        </div>
        <textarea id="page-markdown" rows="8" placeholder="# Page Title&#10;&#10;Introduction content...&#10;&#10;## Section Heading&#10;&#10;Section content with **bold**, *italic*, `code`, tables, lists..."></textarea>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Title Override <span class="label-hint">(optional — uses # heading if blank)</span></label>
          <input id="confluence-title" placeholder="Leave blank to use heading from markdown" />
        </div>
        <div class="form-group">
          <label>Labels <span class="label-hint">(comma-separated, optional)</span></label>
          <input id="confluence-labels" placeholder="e.g., docs, api, team-platform" />
        </div>
      </div>
      <div id="section-list"></div>
      <button class="btn-secondary" onclick="addSection()" style="margin-top:0.5rem; font-size:0.8rem;">+ Add Section</button>
    </div>

    <div class="actions">
      <button class="btn-primary" id="submit" onclick="runPipeline()">Generate Analysis</button>
      <button class="btn-secondary" id="clear" onclick="clearForm()">Clear</button>
    </div>

    <div class="status" id="status"></div>

    <div class="result" id="result" style="display:none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
        <h3 style="margin: 0;">Result</h3>
        <div id="view-toggle" style="display: none;">
          <button class="btn-secondary tab-active" id="tab-preview" onclick="switchView('preview')" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 0.375rem 0 0 0.375rem;">Preview</button>
          <button class="btn-secondary" id="tab-raw" onclick="switchView('raw')" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 0 0.375rem 0.375rem 0; margin-left: -1px;">Raw Markdown</button>
        </div>
      </div>
      <div id="result-links" class="links"></div>
      <div id="download-actions" style="display:none; margin-bottom: 0.75rem;">
        <button class="btn-primary" id="download-md" onclick="downloadFile('md')" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Download .md</button>
        <button class="btn-secondary" id="download-json" onclick="downloadFile('json')" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Download .json</button>
        <button class="btn-secondary" id="copy-md" onclick="copyMarkdown()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Copy Markdown</button>
      </div>
      <div id="iterative-panel" style="display:none; margin-top: 1rem; padding: 1rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <label for="feedback" style="margin: 0; font-size: 0.875rem; font-weight: 600; color: #cbd5e1;">Refinement Feedback</label>
          <span id="iteration-badge" class="pill pill-local">Iteration 1</span>
        </div>
        <textarea id="feedback" rows="3" placeholder="e.g., Add more detail to the database section. The API contracts are missing pagination. Reduce the number of tasks. Add a caching layer to the architecture."></textarea>
        <div style="display: flex; gap: 0.75rem; margin-top: 0.75rem;">
          <button class="btn-primary" id="refine-btn" onclick="refineAnalysis()">Refine</button>
          <button class="btn-secondary" id="approve-btn" onclick="approveAnalysis()" style="background: #14532d; border-color: #22c55e; color: #86efac;">Approve &amp; Finalize</button>
        </div>
      </div>
      <div id="result-preview" class="rendered-markdown"></div>
      <pre id="result-content" style="display: none;"></pre>
    </div>
  </div>

  <!-- Load custom company prompts (gitignored, optional) -->
  <script>var CUSTOM_PROMPTS = [];</script>
  <script src="custom-prompts/custom-prompts.js" onerror=""></script>

  <script>
    const PORT = 10353;
    let lastResult = null;
    let iterativeMode = false;
    let currentIteration = 0;
    let currentAnalysis = null;
    let taskCount = 1;
    let sectionCount = 0;

    // --- Pipeline show/hide ---
    function onPipelineChange() {
      const pipeline = document.getElementById('pipeline').value;
      const isJira = pipeline === 'markdown-to-jira';
      const isConfluence = pipeline === 'markdown-to-confluence';
      const isAI = !isJira && !isConfluence;

      // AI-specific fields
      document.getElementById('ai-fields').style.display = isAI ? '' : 'none';
      document.getElementById('template-group').style.display = isAI ? '' : 'none';

      // Markdown panels
      document.getElementById('jira-panel').style.display = isJira ? '' : 'none';
      document.getElementById('confluence-panel').style.display = isConfluence ? '' : 'none';

      // Button text
      const btn = document.getElementById('submit');
      if (isJira) btn.textContent = 'Create Jira Epic + Stories';
      else if (isConfluence) btn.textContent = 'Publish to Confluence';
      else btn.textContent = 'Generate Analysis';
    }

    // --- File import ---
    function importMdFile(textareaId) {
      const fileInput = document.getElementById('md-file-input');
      fileInput.value = '';
      fileInput.onchange = function() {
        if (!this.files.length) return;
        const reader = new FileReader();
        reader.onload = function(e) { document.getElementById(textareaId).value = e.target.result; };
        reader.readAsText(this.files[0]);
      };
      fileInput.click();
    }

    function importMdToSibling(btn) {
      const entry = btn.closest('.task-entry') || btn.closest('.section-entry');
      const textarea = entry.querySelector('textarea');
      if (!textarea) return;
      const fileInput = document.getElementById('md-file-input');
      fileInput.value = '';
      fileInput.onchange = function() {
        if (!this.files.length) return;
        const reader = new FileReader();
        reader.onload = function(e) { textarea.value = e.target.result; };
        reader.readAsText(this.files[0]);
      };
      fileInput.click();
    }

    // --- Dynamic task entries ---
    function addTask() {
      taskCount++;
      const div = document.createElement('div');
      div.className = 'form-group task-entry';
      div.innerHTML = '<div class="row" style="margin-bottom:0.35rem;">' +
        '<input class="task-key" placeholder="Existing task key (optional, e.g., PROJ-456)" style="flex:1;" />' +
        '<input class="task-assignee" placeholder="Assignee (optional — Account ID, URL, or email)" style="flex:1;" /></div>' +
        '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<label style="margin:0;">Task ' + taskCount + ' <span class="label-hint">— becomes a Story linked to the epic</span></label>' +
        '<div><button class="btn-secondary" onclick="importMdToSibling(this)" style="padding:0.2rem 0.6rem; font-size:0.7rem;">Import .md</button> ' +
        '<button class="btn-secondary" onclick="removeTask(this)" style="padding:0.2rem 0.5rem; font-size:0.7rem;">Remove</button></div></div>' +
        '<textarea class="task-markdown" rows="6" placeholder="# Task Title\n\nTask description...\n\n## Acceptance Criteria\n- ...\n\n## Estimate\nM\n\n## Component\nbackend"></textarea>';
      document.getElementById('task-list').appendChild(div);
    }

    function removeTask(btn) {
      btn.closest('.task-entry').remove();
      document.querySelectorAll('#task-list .task-entry').forEach((el, i) => {
        const lbl = el.querySelector('label');
        lbl.innerHTML = 'Task ' + (i + 1) + ' <span class="label-hint">— becomes a Story linked to the epic</span>';
      });
      taskCount = document.querySelectorAll('#task-list .task-entry').length;
    }

    // --- Dynamic section entries ---
    function addSection() {
      sectionCount++;
      const div = document.createElement('div');
      div.className = 'form-group section-entry';
      div.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<label style="margin:0;">Section ' + sectionCount + ' <span class="label-hint">— appended to the page</span></label>' +
        '<div><button class="btn-secondary" onclick="importMdToSibling(this)" style="padding:0.2rem 0.6rem; font-size:0.7rem;">Import .md</button> ' +
        '<button class="btn-secondary" onclick="removeSection(this)" style="padding:0.2rem 0.5rem; font-size:0.7rem;">Remove</button></div></div>' +
        '<textarea class="section-markdown" rows="6" placeholder="# Section Title\n\nSection content..."></textarea>';
      document.getElementById('section-list').appendChild(div);
    }

    function removeSection(btn) {
      btn.closest('.section-entry').remove();
      document.querySelectorAll('#section-list .section-entry').forEach((el, i) => {
        const lbl = el.querySelector('label');
        lbl.innerHTML = 'Section ' + (i + 1) + ' <span class="label-hint">— appended to the page</span>';
      });
      sectionCount = document.querySelectorAll('#section-list .section-entry').length;
    }

    // --- Jira pipeline ---
    async function runJiraPipeline() {
      const epicMarkdown = document.getElementById('epic-markdown').value.trim();
      if (!epicMarkdown) {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = 'Please enter the epic markdown.';
        return;
      }
      const epicKey = document.getElementById('epic-key').value.trim();
      const jiraComponent = document.getElementById('jira-component').value.trim();
      const jiraAssignee = document.getElementById('jira-assignee').value.trim();
      const jiraReporter = document.getElementById('jira-reporter').value.trim();
      const taskEntries = document.querySelectorAll('#task-list .task-entry');
      const taskMarkdowns = [];
      const taskKeys = [];
      const taskAssignees = [];
      taskEntries.forEach(entry => {
        const md = entry.querySelector('.task-markdown').value.trim();
        const key = entry.querySelector('.task-key')?.value.trim() || '';
        const assignee = entry.querySelector('.task-assignee')?.value.trim() || '';
        if (md) { taskMarkdowns.push(md); taskKeys.push(key); taskAssignees.push(assignee); }
      });

      const isUpdate = !!epicKey;
      document.getElementById('submit').disabled = true;
      document.getElementById('status').className = 'status loading';
      document.getElementById('status').textContent = (isUpdate ? 'Updating' : 'Creating') + ' Jira Epic + ' + taskMarkdowns.length + ' Stories...';
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch('http://localhost:' + PORT + '/webhook/markdown-to-jira', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ epicMarkdown, taskMarkdowns, epicKey, taskKeys, taskAssignees, component: jiraComponent, assignee: jiraAssignee, reporter: jiraReporter })
        });
        let data = await response.json();
        if (Array.isArray(data)) data = data[0];
        if (data?.json) data = data.json;

        if (data.success) {
          document.getElementById('status').className = 'status success';
          const epicAction = data.epic.action || 'created';
          document.getElementById('status').textContent = 'Epic ' + data.epic.key + ' ' + epicAction + ' with ' + data.taskCount + ' linked stories.';

          const links = document.getElementById('result-links');
          let cardsHtml = '<div class="result-cards">';
          cardsHtml += '<div class="result-card">' +
            '<a href="' + data.epic.url + '" target="_blank">' + data.epic.key + ' — ' + (data.epic.title || 'Epic') + '</a>' +
            '<span class="card-badge ' + (epicAction === 'updated' ? 'badge-updated' : 'badge-created') + '">' + epicAction + '</span>' +
            '<div class="card-meta">Epic' + (data.taskCount > 0 ? ' · ' + data.taskCount + ' stories linked' : '') + '</div>' +
            '</div>';
          for (const task of data.tasks || []) {
            const taskAction = task.action || 'created';
            cardsHtml += '<div class="result-card" style="margin-left:1.5rem;">' +
              '<a href="' + task.url + '" target="_blank">' + task.key + ' — ' + (task.title || 'Story') + '</a>' +
              '<span class="card-badge ' + (taskAction === 'updated' ? 'badge-updated' : 'badge-created') + '">' + taskAction + '</span>' +
              '<div class="card-meta">Story · parent: ' + data.epic.key + '</div>' +
              '</div>';
          }
          cardsHtml += '</div>';
          links.innerHTML = cardsHtml;

          document.getElementById('download-actions').style.display = 'none';
          document.getElementById('view-toggle').style.display = 'none';
          document.getElementById('result-preview').style.display = 'none';
          document.getElementById('iterative-panel').style.display = 'none';
          document.getElementById('result-content').style.display = 'none';
          document.getElementById('result').style.display = 'block';
        } else {
          throw new Error(JSON.stringify(data));
        }
      } catch (e) {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = e.message.includes('fetch') ? 'Cannot reach n8n at localhost:' + PORT + '. Is it running?' : 'Error: ' + e.message;
      }
      document.getElementById('submit').disabled = false;
    }

    // --- Confluence pipeline ---
    async function runConfluencePipeline() {
      const pageMarkdown = document.getElementById('page-markdown').value.trim();
      if (!pageMarkdown) {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = 'Please enter the page markdown.';
        return;
      }
      const sectionMarkdowns = Array.from(document.querySelectorAll('.section-markdown'))
        .map(ta => ta.value.trim()).filter(Boolean);
      const title = document.getElementById('confluence-title').value.trim();
      const labels = document.getElementById('confluence-labels').value.trim();
      const pageId = document.getElementById('confluence-page-id').value.trim();

      const isUpdate = !!pageId;
      document.getElementById('submit').disabled = true;
      document.getElementById('status').className = 'status loading';
      document.getElementById('status').textContent = (isUpdate ? 'Updating' : 'Publishing') + ' Confluence page...';
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch('http://localhost:' + PORT + '/webhook/markdown-to-confluence', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageMarkdown, sectionMarkdowns, title, labels, pageId })
        });
        let data = await response.json();
        if (Array.isArray(data)) data = data[0];
        if (data?.json) data = data.json;

        if (data.success) {
          document.getElementById('status').className = 'status success';
          const pageAction = data.confluencePage.action || 'created';
          document.getElementById('status').textContent = 'Confluence page ' + pageAction + ': ' + data.confluencePage.title;

          const pageUrl = data.confluencePage.url;
          const pageTitle = data.confluencePage.title || 'Page';
          document.getElementById('result-links').innerHTML = '<div class="result-cards">' +
            '<div class="result-card">' +
            '<a href="' + pageUrl + '" target="_blank">' + pageTitle + '</a>' +
            '<span class="card-badge ' + (pageAction === 'updated' ? 'badge-updated' : 'badge-created') + '">' + pageAction + '</span>' +
            '<div class="card-meta">Confluence page' + (data.confluencePage.id ? ' · ID: ' + data.confluencePage.id : '') + '</div>' +
            '</div></div>';
          document.getElementById('download-actions').style.display = 'none';
          document.getElementById('view-toggle').style.display = 'none';
          document.getElementById('result-preview').style.display = 'none';
          document.getElementById('iterative-panel').style.display = 'none';
          document.getElementById('result-content').style.display = 'none';
          document.getElementById('result').style.display = 'block';
        } else {
          throw new Error(JSON.stringify(data));
        }
      } catch (e) {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = e.message.includes('fetch') ? 'Cannot reach n8n at localhost:' + PORT + '. Is it running?' : 'Error: ' + e.message;
      }
      document.getElementById('submit').disabled = false;
    }

    // Load custom prompts into dropdown on page load
    (function loadCustomPrompts() {
      if (!window.CUSTOM_PROMPTS || !CUSTOM_PROMPTS.length) return;
      const select = document.getElementById('template');

      // Group by category
      const groups = {};
      for (const t of CUSTOM_PROMPTS) {
        const cat = t.category || 'Custom';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(t);
      }

      // Insert custom groups before the first optgroup (so they appear at top)
      const firstGroup = select.querySelector('optgroup');
      for (const [category, templates] of Object.entries(groups)) {
        const group = document.createElement('optgroup');
        group.label = category + ' (custom)';
        for (const t of templates) {
          const opt = document.createElement('option');
          opt.value = 'custom:' + t.id;
          opt.textContent = t.name;
          group.appendChild(opt);
          // Add to descriptions map
          TEMPLATE_DESCRIPTIONS['custom:' + t.id] = t.description;
        }
        select.insertBefore(group, firstGroup);
      }
    })();

    // Template descriptions for the UI
    const TEMPLATE_DESCRIPTIONS = {
      'generic': 'Default analysis — architecture, APIs, database, edge cases, tasks',
      'new-feature': 'Full technical analysis for a new feature — architecture, APIs, DB, edge cases, tasks',
      'tech-migration': 'Phased migration plan with impact analysis, rollback strategy, and parallel-run approach',
      'large-refactoring': 'Before/after architecture analysis with incremental migration steps',
      'api-breaking-change': 'Contract diff, consumer impact analysis, and versioned migration guide',
      'security-audit': 'Vulnerability report with CVSS-style scoring and remediation tasks',
      'performance-optimization': 'Bottleneck analysis, benchmark targets, and optimization tasks',
      'scheduled-task-migration': 'Discovery document + phased migration plan for scheduled task → job framework',
      'adr': 'Architecture Decision Record — options, decision, consequences (no tickets)',
      'post-mortem': 'Blameless incident analysis with timeline, root cause, and action items (no tickets)',
      'runbook': 'Step-by-step operational procedures for on-call (no tickets)',
      'service-documentation': 'Key files, how to run, architecture, issues, and improvements (no tickets)',
      'bug-fix': 'Root cause analysis and fix ticket — Jira only, no Confluence page',
      'dependency-update': 'Dependency upgrade plan with breaking changes — Jira only',
      'tech-debt': 'Tech debt item with business justification — Jira only',
      'quick-enhancement': 'Small improvement ticket with acceptance criteria — Jira only',
      'legacy-technical': 'Original technical analysis prompt (architecture, APIs, tasks)',
      'legacy-bug': 'Original bug analysis prompt (root cause, fix strategy, tasks)',
      'legacy-spike': 'Original spike/research prompt (options matrix, PoC plan, tasks)'
    };

    function onTemplateChange() {
      const template = document.getElementById('template').value;
      document.getElementById('template-desc').textContent = TEMPLATE_DESCRIPTIONS[template] || '';
    }

    async function runPipeline() {
      const pipeline = document.getElementById('pipeline').value;

      if (pipeline === 'markdown-to-jira') return runJiraPipeline();
      if (pipeline === 'markdown-to-confluence') return runConfluencePipeline();

      const template = document.getElementById('template').value;
      const description = document.getElementById('description').value.trim();
      const context = document.getElementById('context').value.trim();
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const resultContent = document.getElementById('result-content');
      const resultLinks = document.getElementById('result-links');

      if (!description) {
        status.className = 'status error';
        status.textContent = 'Please enter a description.';
        return;
      }

      document.getElementById('submit').disabled = true;
      status.className = 'status loading';
      status.textContent = isIterative
        ? `Generating analysis with auto-critique loop using "${TEMPLATE_DESCRIPTIONS[template]?.split('—')[0]?.trim() || template}" template... this takes 45-120 seconds (3 AI passes).`
        : `Generating analysis using "${TEMPLATE_DESCRIPTIONS[template]?.split('—')[0]?.trim() || template}" template... this takes 15-60 seconds.`;
      result.style.display = 'none';

      const isPreview = pipeline === 'preview' || pipeline === 'preview-cli' || pipeline === 'preview-gh' || pipeline === 'preview-iterative';
      const isIterative = pipeline === 'preview-iterative';
      const webhookPath = pipeline === 'preview-cli' ? 'preview-cli' : (pipeline === 'preview-gh' ? 'preview-gh' : (pipeline === 'preview-iterative' ? 'preview-iterative' : (pipeline === 'preview' ? 'preview' : 'analyze')));

      const body = {
        featureDescription: description,
        additionalContext: context,
        template: template
      };

      // If custom template selected, include the prompt directly in the request
      if (template.startsWith('custom:')) {
        const customId = template.replace('custom:', '');
        const customTemplate = CUSTOM_PROMPTS.find(t => t.id === customId);
        if (customTemplate) {
          body.customRole = customTemplate.role;
          body.customSchema = customTemplate.schema;
        }
      }

      if (!isPreview) {
        body.createJiraTasks = pipeline !== 'analyze-no-jira';
      }

      try {
        const response = await fetch(`http://localhost:${PORT}/webhook/${webhookPath}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        let data = await response.json();
        if (Array.isArray(data)) data = data[0];
        if (data?.json) data = data.json;

        const isSuccess = data.success || data.analysis || data.markdown || data.title || data.confluencePage;

        if (isSuccess) {
          status.className = 'status success';

          if (isPreview) {
            lastResult = data;
            resultLinks.innerHTML = '';
            document.getElementById('download-actions').style.display = 'flex';
            document.getElementById('download-actions').style.gap = '0.5rem';
            document.getElementById('view-toggle').style.display = 'flex';
            const md = data.markdown || JSON.stringify(data.analysis, null, 2);
            resultContent.textContent = md;
            document.getElementById('result-preview').innerHTML = markdownToHtml(md);
            switchView('preview');

            if (isIterative) {
              iterativeMode = true;
              currentAnalysis = data.analysis;
              currentIteration = data.iteration || 1;
              document.getElementById('iterative-panel').style.display = 'block';
              document.getElementById('iteration-badge').textContent = `Iteration ${currentIteration}`;
              status.textContent = `Draft generated: ${data.title} (iteration ${currentIteration}, auto-critiqued). Review below — refine with feedback or approve.`;
            } else {
              document.getElementById('iterative-panel').style.display = 'none';
              status.textContent = `Analysis generated: ${data.title}. Download the files or copy the markdown below.`;
            }
          } else {
            document.getElementById('download-actions').style.display = 'none';
            document.getElementById('view-toggle').style.display = 'none';
            document.getElementById('result-preview').style.display = 'none';
            resultContent.style.display = 'block';
            const parts = [];
            if (data.confluencePage?.url) parts.push(`Confluence: ${data.confluencePage.url}`);
            if (data.taskCount > 0) parts.push(`${data.taskCount} Jira tickets created`);
            status.textContent = parts.join(' | ') || 'Done!';

            resultLinks.innerHTML = '';
            if (data.confluencePage?.url) {
              resultLinks.innerHTML += `<a href="${data.confluencePage.url}" target="_blank">Open Confluence Page</a>`;
            }
            if (data.jiraIssues?.length) {
              for (const issue of data.jiraIssues) {
                if (issue.url) resultLinks.innerHTML += `<a href="${issue.url}" target="_blank">${issue.key}</a>`;
              }
            }
            resultContent.textContent = JSON.stringify(data, null, 2);
          }

          result.style.display = 'block';
        } else if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${JSON.stringify(data, null, 2)}`);
        } else {
          status.className = 'status success';
          status.textContent = 'Analysis complete (unexpected response format — showing raw output)';
          lastResult = data;
          resultLinks.innerHTML = '';
          document.getElementById('download-actions').style.display = 'none';
          resultContent.textContent = JSON.stringify(data, null, 2);
          result.style.display = 'block';
        }
      } catch (e) {
        status.className = 'status error';
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          status.textContent = `Cannot reach n8n at localhost:${PORT}. Is it running? (docker compose up -d)`;
        } else {
          status.textContent = `Error: ${e.message}`;
        }
        result.style.display = 'none';
      }

      document.getElementById('submit').disabled = false;
    }

    function switchView(view) {
      const preview = document.getElementById('result-preview');
      const raw = document.getElementById('result-content');
      const tabPreview = document.getElementById('tab-preview');
      const tabRaw = document.getElementById('tab-raw');
      if (view === 'preview') {
        preview.style.display = 'block';
        raw.style.display = 'none';
        tabPreview.classList.add('tab-active');
        tabRaw.classList.remove('tab-active');
      } else {
        preview.style.display = 'none';
        raw.style.display = 'block';
        tabPreview.classList.remove('tab-active');
        tabRaw.classList.add('tab-active');
      }
    }

    function markdownToHtml(md) {
      let html = md;
      html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim()}</code></pre>`);
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      });
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      html = html.replace(/^---$/gm, '<hr>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      html = html.replace(/^(?!<[a-z/])(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p>\s*<\/p>/g, '');
      return html;
    }

    function getFilename(ext) {
      if (!lastResult) return `analysis.${ext}`;
      const title = lastResult.title || 'analysis';
      const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 50);
      const timestamp = new Date().toISOString().replace(/[T:]/g, '-').split('.')[0];
      return `${timestamp}-${slug}.${ext}`;
    }

    function downloadFile(type) {
      if (!lastResult) return;
      let content, mimeType, filename;
      if (type === 'md') {
        content = lastResult.markdown;
        mimeType = 'text/markdown';
        filename = getFilename('md');
      } else {
        content = JSON.stringify(lastResult.analysis, null, 2);
        mimeType = 'application/json';
        filename = getFilename('json');
      }
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyMarkdown() {
      if (!lastResult?.markdown) return;
      navigator.clipboard.writeText(lastResult.markdown).then(() => {
        const btn = document.getElementById('copy-md');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }

    async function refineAnalysis() {
      const feedback = document.getElementById('feedback').value.trim();
      if (!feedback) {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = 'Please enter feedback for the AI to refine the analysis.';
        return;
      }

      const template = document.getElementById('template').value;
      const status = document.getElementById('status');

      document.getElementById('refine-btn').disabled = true;
      status.className = 'status loading';
      status.textContent = `Refining analysis based on your feedback (iteration ${currentIteration + 1})... this takes 15-60 seconds.`;

      const body = {
        action: 'refine',
        previousAnalysis: currentAnalysis,
        feedback: feedback,
        template: template,
        iteration: currentIteration
      };

      if (template.startsWith('custom:')) {
        const customId = template.replace('custom:', '');
        const customTemplate = CUSTOM_PROMPTS.find(t => t.id === customId);
        if (customTemplate) {
          body.customRole = customTemplate.role;
          body.customSchema = customTemplate.schema;
        }
      }

      try {
        const response = await fetch(`http://localhost:${PORT}/webhook/preview-iterative`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        let data = await response.json();
        if (Array.isArray(data)) data = data[0];
        if (data?.json) data = data.json;

        lastResult = data;
        currentAnalysis = data.analysis;
        currentIteration = data.iteration || (currentIteration + 1);

        document.getElementById('iteration-badge').textContent = `Iteration ${currentIteration}`;
        status.className = 'status success';
        status.textContent = `Refined: ${data.title} (iteration ${currentIteration}). Review below — refine again or approve.`;

        const md = data.markdown || JSON.stringify(data.analysis, null, 2);
        document.getElementById('result-content').textContent = md;
        document.getElementById('result-preview').innerHTML = markdownToHtml(md);
        document.getElementById('feedback').value = '';
        switchView('preview');
      } catch (e) {
        status.className = 'status error';
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          status.textContent = `Cannot reach n8n at localhost:${PORT}. Is it running?`;
        } else {
          status.textContent = `Error refining: ${e.message}`;
        }
      }

      document.getElementById('refine-btn').disabled = false;
    }

    function approveAnalysis() {
      iterativeMode = false;
      document.getElementById('iterative-panel').style.display = 'none';
      const status = document.getElementById('status');
      status.className = 'status success';
      status.textContent = `Analysis approved: ${lastResult?.title || 'Analysis'} (after ${currentIteration} iteration${currentIteration > 1 ? 's' : ''}). Download or copy below.`;
    }

    function clearForm() {
      document.getElementById('description').value = '';
      document.getElementById('context').value = '';
      document.getElementById('status').className = 'status';
      document.getElementById('result').style.display = 'none';
      document.getElementById('download-actions').style.display = 'none';
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('result-preview').innerHTML = '';
      document.getElementById('result-links').innerHTML = '';
      document.getElementById('iterative-panel').style.display = 'none';
      document.getElementById('feedback').value = '';
      document.getElementById('epic-key').value = '';
      document.getElementById('jira-component').value = '';
      document.getElementById('jira-assignee').value = '';
      document.getElementById('jira-reporter').value = '';
      document.getElementById('epic-markdown').value = '';
      document.querySelectorAll('.task-key').forEach(el => el.value = '');
      document.querySelectorAll('.task-assignee').forEach(el => el.value = '');
      document.querySelectorAll('.task-markdown').forEach(ta => ta.value = '');
      document.getElementById('confluence-page-id').value = '';
      document.getElementById('page-markdown').value = '';
      document.getElementById('confluence-title').value = '';
      document.getElementById('confluence-labels').value = '';
      document.querySelectorAll('.section-entry').forEach(el => el.remove());
      sectionCount = 0;
      lastResult = null;
      iterativeMode = false;
      currentIteration = 0;
      currentAnalysis = null;
    }

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') runPipeline();
    });
  </script>

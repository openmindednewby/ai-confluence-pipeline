# Katastasi on GitHub Actions — copy into .github/workflows/katastasi.yml
# Uses the published composite action (openmindednewby/katastasi). Fails the build on a regression.
name: Katastasi
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  trace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: openmindednewby/katastasi@v0.2.0   # or @master
        with:
          args: "trace --run --fail-on regression"
          config: "acp-trace.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katastasi-report
          path: |
            RTM.md
            RTM.html
            runs/
